paths:
  /organizations/{id}/history:
    get:
      tags:
        - Organization History
      summary: "Get Organization Activity History"
      description: |
        Retrieve organization's audit trail and activity logs with pagination.
        Can filter by module (SETTINGS, TEAM, INVENTORY), action type, and target ID.
        Results are sorted by most recent first.
      operationId: getOrganizationHistory
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Organization ID
        - name: page
          in: query
          schema:
            type: number
            default: 1
          description: Page number (1-indexed)
        - name: limit
          in: query
          schema:
            type: number
            default: 10
          description: Records per page
        - name: module
          in: query
          schema:
            type: string
            enum: ["SETTINGS", "TEAM", "INVENTORY"]
          description: Filter by module/section
        - name: action
          in: query
          schema:
            type: string
          description: |
            Filter by action type. Examples:
            - ORG_UPDATED
            - ORG_LOGO_UPLOADED
            - INVITE_SENT
            - MEMBER_REMOVED
            - ROLE_UPDATED
            - INVITE_ACCEPTED
            - INVITE_CANCELLED
            - ITEM_CREATED
            - STOCK_MOVEMENT
        - name: targetId
          in: query
          schema:
            type: string
          description: Filter by specific target (user, invitation, item, etc.)
      responses:
        "200":
          description: "History retrieved successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditLog'
                  pagination:
                    type: object
                    properties:
                      currentPage:
                        type: number
                        example: 1
                      totalPages:
                        type: number
                        example: 5
                      totalItems:
                        type: number
                        example: 47
                      limit:
                        type: number
                        example: 10
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "Unauthorized"

components:
  schemas:
    AuditLog:
      type: object
      properties:
        _id:
          type: string
          example: "507f1f77bcf86cd799439011"
          description: Audit log ID
        organizationId:
          type: string
          example: "507f1f77bcf86cd799439012"
          description: Organization where action occurred
        actor:
          type: object
          description: User who performed the action
          properties:
            _id:
              type: string
              example: "507f1f77bcf86cd799439013"
            firstName:
              type: string
              example: "Admin"
            lastName:
              type: string
              example: "System"
            email:
              type: string
              example: "admin@bambu-services.com"
            profileImage:
              type: string
              example: "http://localhost:3040/api/images/users/avatar_abc.jpg"
        module:
          type: string
          enum: ["SETTINGS", "TEAM", "INVENTORY"]
          example: "TEAM"
          description: Module where action occurred
        action:
          type: string
          example: "INVITE_SENT"
          description: Type of action performed
        targetModel:
          type: string
          enum: ["Organization", "User", "Invitation", "Item", "StockMovement"]
          example: "Invitation"
          description: Type of entity affected
        targetId:
          type: string
          example: "507f1f77bcf86cd799439014"
          description: ID of affected entity
        metadata:
          type: object
          example:
            targetEmail: "new.employee@example.com"
            role: "employee"
            targetName: "Jean Dupont"
          description: Additional context about the action
        diff:
          type: object
          nullable: true
          example:
            before:
              name: "Old Org Name"
            after:
              name: "New Org Name"
          description: Before/after values for update operations
        createdAt:
          type: string
          format: date-time
          example: "2025-05-15T10:30:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-05-15T10:30:00.000Z"

    AuditLogExample:
      type: object
      description: "Common audit log patterns:"
      example:
        organizationSettingsUpdate:
          module: "SETTINGS"
          action: "ORG_UPDATED"
          targetModel: "Organization"
          metadata:
            changes: "name, email, website"
        teamMemberInvite:
          module: "TEAM"
          action: "INVITE_SENT"
          targetModel: "Invitation"
          metadata:
            targetEmail: "new@example.com"
            role: "employee"
            targetName: "Jean Dupont"
        memberRemoved:
          module: "TEAM"
          action: "MEMBER_REMOVED"
          targetModel: "User"
          metadata:
            targetEmail: "removed@example.com"
            targetName: "Marie Martin"
        roleChanged:
          module: "TEAM"
          action: "ROLE_UPDATED"
          targetModel: "User"
          metadata:
            oldRole: "employee"
            role: "admin"
            targetName: "Pierre Bernard"
        logoUpload:
          module: "SETTINGS"
          action: "ORG_LOGO_UPLOADED"
          targetModel: "Organization"
          metadata:
            fileName: "logo_abc123.jpg"
        stockMovement:
          module: "INVENTORY"
          action: "STOCK_MOVEMENT"
          targetModel: "StockMovement"
          metadata:
            itemName: "Laptop Dell XPS"
            type: "IN"
            quantity: 5
