paths:
  /inventory/movement:
    post:
      tags:
        - Inventory Stock
      summary: "Record Stock Movement"
      description: |
        Record a stock IN or OUT movement for an inventory item.
        Automatically updates item's currentQuantity.
        Validates sufficient stock for OUT movements.
        Creates audit trail in stock ledger.
      operationId: recordStockMovement
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - organizationId
                - itemId
                - type
                - quantity
              properties:
                organizationId:
                  type: string
                  example: "507f1f77bcf86cd799439011"
                  description: Organization ID
                itemId:
                  type: string
                  example: "507f1f77bcf86cd799439012"
                  description: Item ID to move stock for
                type:
                  type: string
                  enum: ["IN", "OUT"]
                  example: "IN"
                  description: Stock movement direction (IN = receive, OUT = consume/allocate)
                quantity:
                  type: number
                  example: 5
                  description: Quantity to add or remove (absolute value)
                projectId:
                  type: string
                  nullable: true
                  example: "507f1f77bcf86cd799439013"
                  description: Optional project/allocation reference
                notes:
                  type: string
                  nullable: true
                  example: "Received shipment from supplier XYZ"
                  description: Additional context or reason for movement
      responses:
        "200":
          description: "Stock movement recorded successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "MOVEMENT_RECORDED"
                  currentQuantity:
                    type: number
                    example: 17
                    description: New quantity after movement
        "400":
          description: "Insufficient stock for OUT movement or item not found"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    enum:
                      - "ITEM_NOT_FOUND"
                      - "INSUFFICIENT_STOCK"
        "401":
          description: "Unauthorized"

  /inventory/history:
    get:
      tags:
        - Inventory Stock
      summary: "Get Inventory Ledger / History"
      description: |
        Retrieve complete stock movement history for an organization.
        Supports pagination, filtering by item and movement type.
        Full-text search on item name, SKU, and notes.
        Sorted by most recent first.
      operationId: getInventoryLedger
      security:
        - bearerAuth: []
      parameters:
        - name: organizationId
          in: query
          required: true
          schema:
            type: string
          description: Organization ID
        - name: page
          in: query
          schema:
            type: number
            default: 1
          description: Page number (1-indexed)
        - name: limit
          in: query
          schema:
            type: number
            default: 10
          description: Records per page
        - name: itemId
          in: query
          schema:
            type: string
          description: Filter by specific item
        - name: action
          in: query
          schema:
            type: string
            enum: ["CREATED", "IN", "OUT", "UPDATED"]
          description: Filter by movement type
        - name: search
          in: query
          schema:
            type: string
          description: Search in item name, SKU, or notes
      responses:
        "200":
          description: "Inventory history retrieved successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StockMovement'
                  pagination:
                    type: object
                    properties:
                      currentPage:
                        type: number
                        example: 1
                      totalPages:
                        type: number
                        example: 3
                      totalItems:
                        type: number
                        example: 28
                      limit:
                        type: number
                        example: 10
        "401":
          description: "Unauthorized"

components:
  schemas:
    StockMovement:
      type: object
      properties:
        _id:
          type: string
          example: "507f1f77bcf86cd799439011"
        organizationId:
          type: string
          example: "507f1f77bcf86cd799439012"
        itemId:
          type: object
          description: Populated item reference
          properties:
            _id:
              type: string
              example: "507f1f77bcf86cd799439013"
            name:
              type: string
              example: "Laptop Dell XPS 15"
            sku:
              type: string
              example: "DELL-XPS-15-001"
            category:
              type: string
              example: "IT"
        actor:
          type: object
          description: User who recorded the movement
          properties:
            _id:
              type: string
              example: "507f1f77bcf86cd799439014"
            name:
              type: string
              example: "Admin System"
            email:
              type: string
              example: "admin@bambu-services.com"
        type:
          type: string
          enum: ["CREATED", "IN", "OUT", "UPDATED"]
          example: "IN"
          description: Movement type
        quantity:
          type: number
          example: 5
          description: Quantity moved (absolute value)
        projectId:
          type: string
          nullable: true
          example: "507f1f77bcf86cd799439015"
          description: Associated project/allocation
        notes:
          type: string
          example: "Received shipment from supplier XYZ"
          description: Context or reason for movement
        createdAt:
          type: string
          format: date-time
          example: "2025-05-15T10:30:00.000Z"

    StockMovementExample:
      type: object
      description: "Common stock movement patterns:"
      example:
        initialCreation:
          type: "CREATED"
          quantity: 0
          notes: "Création de l'article"
        purchaseReceived:
          type: "IN"
          quantity: 10
          notes: "Reçu commande #PO-2025-001"
        projectAllocation:
          type: "OUT"
          quantity: 3
          projectId: "507f1f77bcf86cd799439015"
          notes: "Alloué au projet Client ABC"
        adjustmentCorrection:
          type: "UPDATED"
          notes: "Correction de stock (inventaire physique)"
        inventoryRecount:
          type: "OUT"
          quantity: 2
          notes: "Ajustement suite à inventaire réel"
